version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: graphnode
      POSTGRES_PASSWORD: graphnode
      POSTGRES_DB: graphnode
      POSTGRES_INITDB_ARGS: -E UTF8 --locale=C
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ipfs:
    image: ipfs/go-ipfs:v0.34.1
    restart: unless-stopped
    ports:
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs

  graph-node:
    image: graphprotocol/graph-node:v0.37.3
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      - postgres
      - ipfs
    environment:
      postgres_host: postgres
      postgres_user: graphnode
      postgres_pass: graphnode
      postgres_db: graphnode
      ipfs: http://ipfs:5001
      ethereum: "robinhood-testnet:https://rpc.testnet.chain.robinhood.com"
      GRAPH_LOG: info
      GRAPH_ALLOW_NON_DETERMINISTIC_FULLTEXT_SEARCH: "true"

volumes:
  postgres_data:
  ipfs_data:
