type Reserve @entity {
  id: ID!                   # asset address
  asset: Bytes!
  name: String
  symbol: String
  decimals: Int
  borrowingEnabled: Boolean
  collateralEnabled: Boolean
  ltv: BigInt
  liquidationThreshold: BigInt
  liquidationBonus: BigInt
  supplyRateBps: BigInt
  borrowRateBps: BigInt
  priceUsd: BigInt
  totalSupplied: BigInt!
  totalBorrowed: BigInt!
  totalLiquidity: BigInt!
  utilizationRate: BigDecimal!
  supplyCount: BigInt!
  borrowCount: BigInt!
  repayCount: BigInt!
  withdrawCount: BigInt!
  liquidationCount: BigInt!
  userCount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type User @entity {
  id: ID!                   # user address
  address: Bytes!
  supplyCount: BigInt!
  borrowCount: BigInt!
  repayCount: BigInt!
  withdrawCount: BigInt!
  liquidationCount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type SupplyTransaction @entity(immutable: true) {
  id: ID!                   # tx hash + log index
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  reserve: Bytes!
  user: Bytes!
  onBehalfOf: Bytes!
  amount: BigInt!
  referralCode: Int
}

type WithdrawTransaction @entity(immutable: true) {
  id: ID!
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  reserve: Bytes!
  user: Bytes!
  to: Bytes!
  amount: BigInt!
}

type BorrowTransaction @entity(immutable: true) {
  id: ID!
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  reserve: Bytes!
  user: Bytes!
  onBehalfOf: Bytes!
  amount: BigInt!
  interestRateMode: BigInt!
  borrowRate: BigInt!
  referralCode: Int
}

type RepayTransaction @entity(immutable: true) {
  id: ID!
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  reserve: Bytes!
  user: Bytes!
  repayer: Bytes!
  amount: BigInt!
  useATokens: Boolean
}

type LiquidationTransaction @entity(immutable: true) {
  id: ID!
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  collateralAsset: Bytes!
  debtAsset: Bytes!
  user: Bytes!
  debtToCover: BigInt!
  liquidatedCollateralAmount: BigInt!
  liquidator: Bytes!
  receiveAToken: Boolean
}
