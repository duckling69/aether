specVersion: 1.2.0
description: Morbit RWA Lending Protocol on Robinhood Chain Testnet
repository: https://github.com/morbit/morbit-rwa
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: RWAPool
    network: robinhood-testnet
    source:
      address: "0xCB7460EdA8379D0eE4D2E008216E40DB782254cc"
      abi: RWAPool
      startBlock: 74351275
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Reserve
        - User
        - SupplyTransaction
        - WithdrawTransaction
        - BorrowTransaction
        - RepayTransaction
        - LiquidationTransaction
      abis:
        - name: RWAPool
          file: ./abis/RWAPool.json
      eventHandlers:
        - event: ReserveInitialized(indexed address)
          handler: handleReserveInitialized
        - event: PriceUpdated(indexed address,uint256)
          handler: handlePriceUpdated
        - event: Supply(indexed address,address,indexed address,uint256,uint16)
          handler: handleSupply
        - event: Withdraw(indexed address,indexed address,indexed address,uint256)
          handler: handleWithdraw
        - event: Borrow(indexed address,address,indexed address,uint256,uint256,uint256,uint16)
          handler: handleBorrow
        - event: Repay(indexed address,indexed address,indexed address,uint256,bool)
          handler: handleRepay
        - event: ReserveUsedAsCollateralEnabled(indexed address,indexed address)
          handler: handleCollateralEnabled
        - event: ReserveUsedAsCollateralDisabled(indexed address,indexed address)
          handler: handleCollateralDisabled
        - event: LiquidationCall(indexed address,indexed address,indexed address,uint256,uint256,address,bool)
          handler: handleLiquidationCall
      file: ./src/mapping.ts
